<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">GEMM + AllScatter 四系统横向对比</title>
  <desc id="desc">基于当前仓库实现的 TileScale、Triton-distributed、Iris、XTile 横向展示图。</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="55%" stop-color="#F5F7FB"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>

    <style>
      .title { font: 700 38px "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", sans-serif; fill: #0F172A; }
      .subtitle { font: 500 18px "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", sans-serif; fill: #475569; }
      .badge { font: 700 16px "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", sans-serif; fill: #F8FAFC; }

      .header-name { font: 700 24px "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", sans-serif; fill: #FFFFFF; }
      .header-sub { font: 500 14px "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", sans-serif; fill: #E2E8F0; }
      .header-index { font: 700 13px "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", sans-serif; fill: #FFFFFF; }

      .section-label { font: 700 15px "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", sans-serif; fill: #64748B; letter-spacing: 1px; }
      .row-index { font: 700 13px "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", sans-serif; fill: #64748B; letter-spacing: 1.2px; }
      .row-label { font: 700 20px "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", sans-serif; fill: #0F172A; }

      .cell-2 { font: 600 17px "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", sans-serif; fill: #0F172A; }
      .cell-3 { font: 600 15px "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", sans-serif; fill: #0F172A; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="110" r="190" fill="#DBEAFE" opacity="0.55"/>
  <circle cx="132" cy="110" r="86" fill="#FDE68A" opacity="0.35"/>
  <circle cx="142" cy="818" r="160" fill="#E0E7FF" opacity="0.42"/>

  <text class="title" x="64" y="86">GEMM + AllScatter 四系统横向对比</text>
  <text class="subtitle" x="64" y="120">基于当前仓库实现 · 用于横向展示的摘要图</text>

  <rect x="1310" y="52" width="226" height="42" rx="21" fill="#111827"/>
  <text class="badge" x="1423" y="79" text-anchor="middle">展示版 · 当前仓库实现</text>

  <rect x="40" y="148" width="1520" height="712" rx="30" fill="#FFFFFF" fill-opacity="0.84" stroke="#E2E8F0" stroke-width="1.5"/>

  <text class="section-label" x="60" y="202">对比维度</text>

  <!-- Column headers -->
  <g filter="url(#shadow)">
    <rect x="280" y="176" width="300" height="74" rx="24" fill="#5B4AE6"/>
    <rect x="600" y="176" width="300" height="74" rx="24" fill="#0F7AE5"/>
    <rect x="920" y="176" width="300" height="74" rx="24" fill="#0F9F6E"/>
    <rect x="1240" y="176" width="300" height="74" rx="24" fill="#E37314"/>
  </g>

  <g>
    <rect x="512" y="192" width="48" height="24" rx="12" fill="#FFFFFF" fill-opacity="0.16"/>
    <text class="header-index" x="536" y="209" text-anchor="middle">01</text>
    <text class="header-name" x="304" y="210">TileScale</text>
    <text class="header-sub" x="304" y="233">TVM / NVSHMEM 路线</text>

    <rect x="832" y="192" width="48" height="24" rx="12" fill="#FFFFFF" fill-opacity="0.16"/>
    <text class="header-index" x="856" y="209" text-anchor="middle">02</text>
    <text class="header-name" x="624" y="210">Triton-distributed</text>
    <text class="header-sub" x="624" y="233">Distributed Dialect 路线</text>

    <rect x="1152" y="192" width="48" height="24" rx="12" fill="#FFFFFF" fill-opacity="0.16"/>
    <text class="header-index" x="1176" y="209" text-anchor="middle">03</text>
    <text class="header-name" x="944" y="210">Iris</text>
    <text class="header-sub" x="944" y="233">Pure Triton 远端访存</text>

    <rect x="1472" y="192" width="48" height="24" rx="12" fill="#FFFFFF" fill-opacity="0.16"/>
    <text class="header-index" x="1496" y="209" text-anchor="middle">04</text>
    <text class="header-name" x="1264" y="210">XTile</text>
    <text class="header-sub" x="1264" y="233">Host Ops + Pattern 层</text>
  </g>

  <!-- Row labels -->
  <g>
    <rect x="60" y="272" width="200" height="72" rx="20" fill="#F8FAFC" stroke="#CBD5E1"/>
    <rect x="60" y="356" width="200" height="72" rx="20" fill="#F8FAFC" stroke="#CBD5E1"/>
    <rect x="60" y="440" width="200" height="72" rx="20" fill="#F8FAFC" stroke="#CBD5E1"/>
    <rect x="60" y="524" width="200" height="72" rx="20" fill="#F8FAFC" stroke="#CBD5E1"/>
    <rect x="60" y="608" width="200" height="72" rx="20" fill="#F8FAFC" stroke="#CBD5E1"/>
    <rect x="60" y="692" width="200" height="72" rx="20" fill="#F8FAFC" stroke="#CBD5E1"/>
    <rect x="60" y="776" width="200" height="72" rx="20" fill="#F8FAFC" stroke="#CBD5E1"/>

    <text class="row-index" x="84" y="300">01</text>
    <text class="row-label" x="84" y="326">用户接口层级</text>

    <text class="row-index" x="84" y="384">02</text>
    <text class="row-label" x="84" y="410">编译表示</text>

    <text class="row-index" x="84" y="468">03</text>
    <text class="row-label" x="84" y="494">重叠控制</text>

    <text class="row-index" x="84" y="552">04</text>
    <text class="row-label" x="84" y="578">通信机制</text>

    <text class="row-index" x="84" y="636">05</text>
    <text class="row-label" x="84" y="662">运行时依赖</text>

    <text class="row-index" x="84" y="720">06</text>
    <text class="row-label" x="84" y="746">目标硬件</text>

    <text class="row-index" x="84" y="804">07</text>
    <text class="row-label" x="84" y="830">集合通信抽象</text>
  </g>

  <!-- Matrix cells -->
  <g>
    <!-- TileScale -->
    <rect x="280" y="272" width="300" height="72" rx="20" fill="#F5F3FF" stroke="#C4B5FD"/>
    <rect x="280" y="356" width="300" height="72" rx="20" fill="#F5F3FF" stroke="#C4B5FD"/>
    <rect x="280" y="440" width="300" height="72" rx="20" fill="#F5F3FF" stroke="#C4B5FD"/>
    <rect x="280" y="524" width="300" height="72" rx="20" fill="#F5F3FF" stroke="#C4B5FD"/>
    <rect x="280" y="608" width="300" height="72" rx="20" fill="#F5F3FF" stroke="#C4B5FD"/>
    <rect x="280" y="692" width="300" height="72" rx="20" fill="#F5F3FF" stroke="#C4B5FD"/>
    <rect x="280" y="776" width="300" height="72" rx="20" fill="#F5F3FF" stroke="#C4B5FD"/>

    <!-- Triton-distributed -->
    <rect x="600" y="272" width="300" height="72" rx="20" fill="#EFF6FF" stroke="#93C5FD"/>
    <rect x="600" y="356" width="300" height="72" rx="20" fill="#EFF6FF" stroke="#93C5FD"/>
    <rect x="600" y="440" width="300" height="72" rx="20" fill="#EFF6FF" stroke="#93C5FD"/>
    <rect x="600" y="524" width="300" height="72" rx="20" fill="#EFF6FF" stroke="#93C5FD"/>
    <rect x="600" y="608" width="300" height="72" rx="20" fill="#EFF6FF" stroke="#93C5FD"/>
    <rect x="600" y="692" width="300" height="72" rx="20" fill="#EFF6FF" stroke="#93C5FD"/>
    <rect x="600" y="776" width="300" height="72" rx="20" fill="#EFF6FF" stroke="#93C5FD"/>

    <!-- Iris -->
    <rect x="920" y="272" width="300" height="72" rx="20" fill="#ECFDF5" stroke="#6EE7B7"/>
    <rect x="920" y="356" width="300" height="72" rx="20" fill="#ECFDF5" stroke="#6EE7B7"/>
    <rect x="920" y="440" width="300" height="72" rx="20" fill="#ECFDF5" stroke="#6EE7B7"/>
    <rect x="920" y="524" width="300" height="72" rx="20" fill="#ECFDF5" stroke="#6EE7B7"/>
    <rect x="920" y="608" width="300" height="72" rx="20" fill="#ECFDF5" stroke="#6EE7B7"/>
    <rect x="920" y="692" width="300" height="72" rx="20" fill="#ECFDF5" stroke="#6EE7B7"/>
    <rect x="920" y="776" width="300" height="72" rx="20" fill="#ECFDF5" stroke="#6EE7B7"/>

    <!-- XTile -->
    <rect x="1240" y="272" width="300" height="72" rx="20" fill="#FFF7ED" stroke="#FDBA74"/>
    <rect x="1240" y="356" width="300" height="72" rx="20" fill="#FFF7ED" stroke="#FDBA74"/>
    <rect x="1240" y="440" width="300" height="72" rx="20" fill="#FFF7ED" stroke="#FDBA74"/>
    <rect x="1240" y="524" width="300" height="72" rx="20" fill="#FFF7ED" stroke="#FDBA74"/>
    <rect x="1240" y="608" width="300" height="72" rx="20" fill="#FFF7ED" stroke="#FDBA74"/>
    <rect x="1240" y="692" width="300" height="72" rx="20" fill="#FFF7ED" stroke="#FDBA74"/>
    <rect x="1240" y="776" width="300" height="72" rx="20" fill="#FFF7ED" stroke="#FDBA74"/>
  </g>

  <!-- Cell text -->
  <g>
    <!-- Row 1 -->
    <text class="cell-2" x="304" y="300">
      <tspan x="304" y="300">TileLang</tspan>
      <tspan x="304" y="323">分布式原语</tspan>
    </text>
    <text class="cell-2" x="624" y="300">
      <tspan x="624" y="300">Triton 分布式</tspan>
      <tspan x="624" y="323">低层 op</tspan>
    </text>
    <text class="cell-2" x="944" y="300">
      <tspan x="944" y="300">Triton kernel 内</tspan>
      <tspan x="944" y="323">远端访存原语</tspan>
    </text>
    <text class="cell-2" x="1264" y="300">
      <tspan x="1264" y="300">Host ops + patterns</tspan>
      <tspan x="1264" y="323">+ primitives</tspan>
    </text>

    <!-- Row 2 -->
    <text class="cell-2" x="304" y="384">
      <tspan x="304" y="384">TVM IR</tspan>
      <tspan x="304" y="407">+ extern / NVSHMEM</tspan>
    </text>
    <text class="cell-2" x="624" y="384">
      <tspan x="624" y="384">Distributed dialect</tspan>
      <tspan x="624" y="407">+ backend lowering</tspan>
    </text>
    <text class="cell-2" x="944" y="384">
      <tspan x="944" y="384">标准 Triton</tspan>
      <tspan x="944" y="407">load / store</tspan>
    </text>
    <text class="cell-2" x="1264" y="384">
      <tspan x="1264" y="384">标准 Triton</tspan>
      <tspan x="1264" y="407">+ 地址翻译 / atomic</tspan>
    </text>

    <!-- Row 3 -->
    <text class="cell-2" x="304" y="468">
      <tspan x="304" y="468">用户编排</tspan>
      <tspan x="304" y="491">编译器与硬件配合</tspan>
    </text>
    <text class="cell-2" x="624" y="468">
      <tspan x="624" y="468">用户显式写</tspan>
      <tspan x="624" y="491">同步与通信</tspan>
    </text>
    <text class="cell-2" x="944" y="468">
      <tspan x="944" y="468">用户手写</tspan>
      <tspan x="944" y="491">kernel pattern</tspan>
    </text>
    <text class="cell-2" x="1264" y="468">
      <tspan x="1264" y="468">显式 pattern</tspan>
      <tspan x="1264" y="491">或 auto-select</tspan>
    </text>

    <!-- Row 4 -->
    <text class="cell-2" x="304" y="552">
      <tspan x="304" y="552">NVSHMEM</tspan>
      <tspan x="304" y="575">+ 远端拷贝 helper</tspan>
    </text>
    <text class="cell-2" x="624" y="552">
      <tspan x="624" y="552">SHMEM runtime</tspan>
      <tspan x="624" y="575">+ distributed lowering</tspan>
    </text>
    <text class="cell-2" x="944" y="552">
      <tspan x="944" y="552">地址翻译</tspan>
      <tspan x="944" y="575">+ remote load/store</tspan>
    </text>
    <text class="cell-3" x="1264" y="548">
      <tspan x="1264" y="548">地址翻译 + Triton 原语</tspan>
      <tspan x="1264" y="568">+</tspan>
      <tspan x="1264" y="588">tile collectives</tspan>
    </text>

    <!-- Row 5 -->
    <text class="cell-2" x="304" y="636">
      <tspan x="304" y="636">torch.distributed</tspan>
      <tspan x="304" y="659">+ NVSHMEM</tspan>
    </text>
    <text class="cell-2" x="624" y="636">
      <tspan x="624" y="636">torch.distributed</tspan>
      <tspan x="624" y="659">+ SHMEM runtime</tspan>
    </text>
    <text class="cell-3" x="944" y="630">
      <tspan x="944" y="630">PyTorch + torch.distributed</tspan>
      <tspan x="944" y="650">+</tspan>
      <tspan x="944" y="670">ROCm runtime</tspan>
    </text>
    <text class="cell-3" x="1264" y="630">
      <tspan x="1264" y="630">PyTorch + Triton</tspan>
      <tspan x="1264" y="650">+</tspan>
      <tspan x="1264" y="670">CUDA/HIP runtime</tspan>
    </text>

    <!-- Row 6 -->
    <text class="cell-2" x="304" y="720">
      <tspan x="304" y="720">NVIDIA</tspan>
    </text>
    <text class="cell-2" x="624" y="720">
      <tspan x="624" y="720">NVIDIA / AMD</tspan>
    </text>
    <text class="cell-2" x="944" y="720">
      <tspan x="944" y="720">AMD / ROCm</tspan>
    </text>
    <text class="cell-2" x="1264" y="720">
      <tspan x="1264" y="720">NVIDIA / AMD</tspan>
    </text>

    <!-- Row 7 -->
    <text class="cell-2" x="304" y="804">
      <tspan x="304" y="804">分布式原语</tspan>
      <tspan x="304" y="827">组合</tspan>
    </text>
    <text class="cell-2" x="624" y="804">
      <tspan x="624" y="804">低层原语</tspan>
      <tspan x="624" y="827">组合</tspan>
    </text>
    <text class="cell-2" x="944" y="804">
      <tspan x="944" y="804">远端访存原语</tspan>
      <tspan x="944" y="827">组合</tspan>
    </text>
    <text class="cell-2" x="1264" y="804">
      <tspan x="1264" y="804">host collective ops</tspan>
      <tspan x="1264" y="827">+ tile collectives</tspan>
    </text>
  </g>
</svg>
