<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: bold 32px sans-serif; fill: #1a1a1a; }
      .subtitle { font: 20px sans-serif; fill: #666; }
      .layer-title { font: bold 22px sans-serif; fill: #1a1a1a; }
      .primitive { font: 16px 'Monaco', monospace; fill: #2c3e50; }
      .annotation { font: italic 15px sans-serif; fill: #7f8c8d; }
      .highlight { font: bold 18px sans-serif; fill: #e74c3c; }

      .layer-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 2; rx: 8; }
      .primitive-box { fill: white; stroke: #3498db; stroke-width: 2; rx: 6; }
      .core-box { fill: #fff5e6; stroke: #ff9800; stroke-width: 3; rx: 6; }
      .collective-box { fill: #e8f5e9; stroke: #4caf50; stroke-width: 2; rx: 6; }

      .arrow { stroke: #95a5a6; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .emphasis-arrow { stroke: #e74c3c; stroke-width: 3; fill: none; marker-end: url(#arrowhead-red); }
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#95a5a6" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#e74c3c" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="700" y="50" class="title" text-anchor="middle">Tile-Native Communication Primitives</text>
  <text x="700" y="80" class="subtitle" text-anchor="middle">Compiler-Visible @triton.jit Building Blocks</text>

  <!-- Layer 3: Collective Operations -->
  <rect x="100" y="120" width="1200" height="140" class="layer-box"/>
  <text x="120" y="150" class="layer-title">Collective Operations</text>

  <rect x="140" y="170" width="200" height="70" class="collective-box"/>
  <text x="240" y="195" class="primitive" text-anchor="middle">tile_allreduce</text>
  <text x="240" y="215" class="primitive" text-anchor="middle">tile_allgather</text>
  <text x="240" y="230" class="annotation" text-anchor="middle" font-size="13">ring algorithm</text>

  <rect x="380" y="170" width="200" height="70" class="collective-box"/>
  <text x="480" y="195" class="primitive" text-anchor="middle">tile_scatter</text>
  <text x="480" y="215" class="primitive" text-anchor="middle">tile_reduce_scatter</text>
  <text x="480" y="230" class="annotation" text-anchor="middle" font-size="13">peer-read model</text>

  <rect x="620" y="170" width="200" height="70" class="collective-box"/>
  <text x="720" y="205" class="primitive" text-anchor="middle">tile_broadcast</text>
  <text x="720" y="230" class="annotation" text-anchor="middle" font-size="13">root distributes</text>

  <text x="1100" y="210" class="annotation">Pure Triton implementation</text>
  <text x="1100" y="230" class="annotation">No NCCL dependency</text>

  <!-- Layer 2: Point-to-Point & Synchronization -->
  <rect x="100" y="290" width="1200" height="180" class="layer-box"/>
  <text x="120" y="320" class="layer-title">Point-to-Point Communication and Synchronization</text>

  <!-- P2P Communication -->
  <rect x="140" y="340" width="180" height="110" class="primitive-box"/>
  <text x="230" y="365" class="primitive" text-anchor="middle">tile_remote_load</text>
  <text x="230" y="385" class="primitive" text-anchor="middle">tile_remote_store</text>
  <text x="230" y="410" class="primitive" text-anchor="middle">tile_put</text>
  <text x="230" y="430" class="primitive" text-anchor="middle">tile_get</text>

  <!-- Atomic Operations -->
  <rect x="360" y="340" width="180" height="110" class="primitive-box"/>
  <text x="450" y="365" class="primitive" text-anchor="middle">tile_atomic_add</text>
  <text x="450" y="385" class="primitive" text-anchor="middle">tile_atomic_cas</text>
  <text x="450" y="405" class="primitive" text-anchor="middle">tile_atomic_xchg</text>
  <text x="450" y="425" class="annotation" text-anchor="middle" font-size="13">+ min/max/bitwise ops</text>

  <!-- Synchronization -->
  <rect x="580" y="340" width="180" height="110" class="primitive-box"/>
  <text x="670" y="375" class="primitive" text-anchor="middle">tile_signal</text>
  <text x="670" y="395" class="primitive" text-anchor="middle">tile_wait</text>
  <text x="670" y="420" class="annotation" text-anchor="middle" font-size="13">producer-consumer</text>
  <text x="670" y="435" class="annotation" text-anchor="middle" font-size="13">acquire-release</text>

  <text x="1000" y="385" class="annotation">Zero-copy remote access</text>
  <text x="1000" y="410" class="annotation">Cross-GPU atomics</text>
  <text x="1000" y="435" class="annotation">Explicit memory ordering</text>

  <!-- Layer 1: Pointer Translation (CORE) -->
  <rect x="100" y="500" width="1200" height="160" class="layer-box"/>
  <text x="120" y="530" class="layer-title">Foundation: Symmetric Memory</text>

  <rect x="300" y="550" width="500" height="90" class="core-box"/>
  <text x="550" y="585" class="primitive" text-anchor="middle" font-size="20">translate_ptr(ptr, from_rank, to_rank, heap_bases)</text>
  <text x="550" y="615" class="highlight" text-anchor="middle">5-instruction pointer translation</text>
  <text x="550" y="635" class="annotation" text-anchor="middle">local_offset = ptr - heap_base[from] → remote_ptr = heap_base[to] + local_offset</text>

  <text x="1000" y="590" class="annotation">Symmetric heap layout</text>
  <text x="1000" y="615" class="annotation">IPC-based peer access</text>

  <!-- Arrows showing dependencies -->
  <path d="M 240 240 L 240 340" class="arrow"/>
  <path d="M 480 240 L 450 340" class="arrow"/>
  <path d="M 720 240 L 670 340" class="arrow"/>

  <path d="M 230 450 L 400 550" class="emphasis-arrow"/>
  <path d="M 450 450 L 500 550" class="emphasis-arrow"/>
  <path d="M 670 450 L 600 550" class="emphasis-arrow"/>

  <!-- Bottom annotation -->
  <rect x="100" y="690" width="1200" height="180" fill="#fff9e6" stroke="#ffc107" stroke-width="2" rx="8"/>
  <text x="700" y="725" class="layer-title" text-anchor="middle">What Makes It Tile-Native?</text>

  <text x="150" y="760" class="annotation" font-size="16">✓ <tspan font-weight="bold">Compiler-Visible</tspan>: All primitives are @triton.jit — compiler sees full dataflow</text>
  <text x="150" y="790" class="annotation" font-size="16">✓ <tspan font-weight="bold">Uniform Granularity</tspan>: Compute, memory, and communication operate at same tile scale</text>
  <text x="150" y="820" class="annotation" font-size="16">✓ <tspan font-weight="bold">Composable</tspan>: Primitives combine freely within single kernel — no host synchronization</text>
  <text x="150" y="850" class="annotation" font-size="16">✓ <tspan font-weight="bold">Zero-Copy</tspan>: Direct cross-GPU memory access via symmetric heaps and pointer translation</text>
</svg>