<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11">
  <defs>
    <style>
      .layer-box { fill: #f8f8f8; stroke: #333; stroke-width: 1.2; rx: 4; }
      .layer-label { font-size: 10px; fill: #888; font-weight: 600; letter-spacing: 0.5px; }
      .title-text { font-size: 12px; fill: #222; font-weight: 700; }
      .body-text { font-size: 10.5px; fill: #444; }
      .accent-box { fill: #ededed; stroke: #999; stroke-width: 0.8; rx: 3; }
      .arrow { stroke: #666; stroke-width: 1.2; fill: none; marker-end: url(#arrowhead); }
      .divider { stroke: #ccc; stroke-width: 0.6; stroke-dasharray: 4,3; }
    </style>
    <marker id="arrowhead" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#666"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#111">TNCC Architecture</text>

  <!-- Layer 0: User API -->
  <rect class="layer-box" x="40" y="40" width="640" height="62"/>
  <text class="layer-label" x="56" y="56">USER API</text>
  <text class="title-text" x="56" y="72">tncc.ops</text>
  <text class="body-text" x="56" y="90">gemm_allscatter  ·  gemm_allgather  ·  gemm_reducescatter  ·  allgather  ·  allreduce  ·  reduce_scatter</text>

  <line class="arrow" x1="360" y1="102" x2="360" y2="118"/>

  <!-- Layer 1: Plan Builder -->
  <rect class="layer-box" x="40" y="120" width="640" height="50"/>
  <text class="layer-label" x="56" y="136">PLAN BUILDER</text>
  <text class="body-text" x="56" y="154">build_*_plan()  →  PatternExecutionSpec  →  plan.execute()</text>

  <line class="arrow" x1="360" y1="170" x2="360" y2="186"/>

  <!-- Layer 2: Pattern Library — 4 boxes side by side -->
  <rect class="layer-box" x="40" y="188" width="640" height="82"/>
  <text class="layer-label" x="56" y="204">OVERLAP PATTERNS</text>

  <rect class="accent-box" x="56" y="212" width="142" height="48"/>
  <text class="title-text" x="127" y="228" text-anchor="middle">BulkSync</text>
  <text class="body-text" x="127" y="244" text-anchor="middle" font-size="9.5" fill="#666">sequential baseline</text>

  <rect class="accent-box" x="210" y="212" width="142" height="48"/>
  <text class="title-text" x="281" y="228" text-anchor="middle">FusedSequential</text>
  <text class="body-text" x="281" y="244" text-anchor="middle" font-size="9.5" fill="#666">single kernel, tile-seq</text>

  <rect class="accent-box" x="364" y="212" width="142" height="48"/>
  <text class="title-text" x="435" y="228" text-anchor="middle">ProducerConsumer</text>
  <text class="body-text" x="435" y="244" text-anchor="middle" font-size="9.5" fill="#666">dual-stream parallel</text>

  <rect class="accent-box" x="518" y="212" width="148" height="48"/>
  <text class="title-text" x="592" y="228" text-anchor="middle">WG-Specialized</text>
  <text class="body-text" x="592" y="244" text-anchor="middle" font-size="9.5" fill="#666">SM-partitioned kernel</text>

  <line class="arrow" x1="360" y1="270" x2="360" y2="286"/>

  <!-- Layer 3: Tile Primitives — 3 sub-boxes -->
  <rect class="layer-box" x="40" y="288" width="640" height="72"/>
  <text class="layer-label" x="56" y="304">TILE PRIMITIVES</text>

  <rect class="accent-box" x="56" y="312" width="194" height="38"/>
  <text class="title-text" x="153" y="326" text-anchor="middle">Compute</text>
  <text class="body-text" x="153" y="340" text-anchor="middle" font-size="9.5" fill="#666">tile_dot · tile_reduce</text>

  <rect class="accent-box" x="263" y="312" width="194" height="38"/>
  <text class="title-text" x="360" y="326" text-anchor="middle">Memory</text>
  <text class="body-text" x="360" y="340" text-anchor="middle" font-size="9.5" fill="#666">tile_load · tile_store</text>

  <rect class="accent-box" x="470" y="312" width="196" height="38"/>
  <text class="title-text" x="568" y="326" text-anchor="middle">Communication</text>
  <text class="body-text" x="568" y="340" text-anchor="middle" font-size="9.5" fill="#666">tile_remote_store · tile_put</text>

  <line class="arrow" x1="360" y1="360" x2="360" y2="376"/>

  <!-- Layer 4: Synchronization -->
  <rect class="layer-box" x="40" y="378" width="640" height="42"/>
  <text class="layer-label" x="56" y="394">SYNCHRONIZATION</text>
  <text class="body-text" x="56" y="410">tile_signal  ·  tile_wait  ·  tile_barrier  ·  tile_atomic_{add, cas, xchg}      acquire / release semantics</text>

  <line class="arrow" x1="360" y1="420" x2="360" y2="434"/>

  <!-- Layer 5: Memory -->
  <rect class="layer-box" x="40" y="436" width="640" height="36"/>
  <text class="layer-label" x="56" y="454">SYMMETRIC MEMORY</text>
  <text class="body-text" x="200" y="454">SymmetricHeap  ·  Pointer Translation  ·  Allocators</text>

  <line class="arrow" x1="360" y1="472" x2="360" y2="484"/>

  <!-- Layer 6: HAL -->
  <rect class="layer-box" x="40" y="486" width="640" height="28" style="fill: #efefef;"/>
  <text class="body-text" x="360" y="504" text-anchor="middle" font-weight="600" fill="#555">CUDA  (NVLink · IPC)                                          HIP  (xGMI · IPC)</text>
</svg>
