<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="'Helvetica Neue', 'Arial', sans-serif">
  <defs>
    <style>
      .bg { fill: #fff; }
      .fig-title { font-size: 15px; fill: #111; font-weight: 700; }
      .pattern-name { font-size: 12px; fill: #222; font-weight: 700; }
      .pattern-desc { font-size: 9.5px; fill: #777; }
      .label { font-size: 9px; fill: #999; font-weight: 600; letter-spacing: 0.3px; }
      .gemm-fill { fill: #4A7FC7; }
      .comm-fill { fill: #E8963A; }
      .barrier-fill { fill: #ccc; }
      .outline { stroke: #888; stroke-width: 1; fill: none; rx: 3; }
      .progress-arrow { stroke: #bbb; stroke-width: 1.2; fill: none; marker-end: url(#pah); }
      .time-arrow { stroke: #aaa; stroke-width: 0.8; fill: none; marker-end: url(#tah); }
    </style>
    <marker id="pah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#bbb"/>
    </marker>
    <marker id="tah" markerWidth="5" markerHeight="4" refX="4" refY="2" orient="auto">
      <polygon points="0 0, 5 2, 0 4" fill="#aaa"/>
    </marker>
  </defs>

  <rect class="bg" width="820" height="340"/>

  <!-- Title -->
  <text class="fig-title" x="410" y="26" text-anchor="middle">Overlap Patterns: From Sequential to SM-Partitioned</text>

  <!-- Bottom axis label -->
  <line class="progress-arrow" x1="60" y1="318" x2="760" y2="318"/>
  <text x="410" y="336" text-anchor="middle" font-size="10" fill="#888" font-weight="600">increasing overlap granularity</text>

  <!-- ===== Pattern 1: BulkSync ===== -->
  <g transform="translate(30, 0)">
    <text class="pattern-name" x="90" y="56" text-anchor="middle">BulkSync</text>
    <text class="pattern-desc" x="90" y="70" text-anchor="middle">no overlap (baseline)</text>

    <!-- Time arrow -->
    <line class="time-arrow" x1="22" y1="85" x2="22" y2="285"/>
    <text class="label" x="17" y="188" text-anchor="middle" transform="rotate(-90,17,188)">time</text>

    <!-- GEMM block -->
    <rect class="gemm-fill" x="35" y="88" width="110" height="80" rx="3" opacity="0.85"/>
    <text x="90" y="132" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">GEMM</text>

    <!-- Barrier -->
    <rect class="barrier-fill" x="35" y="173" width="110" height="18" rx="2"/>
    <text x="90" y="186" text-anchor="middle" fill="#666" font-size="9">sync</text>

    <!-- Scatter -->
    <rect class="comm-fill" x="35" y="196" width="110" height="65" rx="3" opacity="0.85"/>
    <text x="90" y="232" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Scatter</text>
  </g>

  <!-- ===== Pattern 2: FusedSequential ===== -->
  <g transform="translate(220, 0)">
    <text class="pattern-name" x="90" y="56" text-anchor="middle">FusedSequential</text>
    <text class="pattern-desc" x="90" y="70" text-anchor="middle">tile-level, sequential</text>

    <rect x="35" y="88" width="110" height="174" rx="3" fill="none" stroke="#666" stroke-width="1"/>
    <text class="label" x="90" y="82" text-anchor="middle">single kernel</text>

    <!-- Interleaved compute/scatter tiles -->
    <rect class="gemm-fill" x="40" y="93" width="100" height="24" rx="2" opacity="0.82"/>
    <rect class="comm-fill" x="40" y="120" width="100" height="14" rx="2" opacity="0.82"/>
    <rect class="gemm-fill" x="40" y="137" width="100" height="24" rx="2" opacity="0.82"/>
    <rect class="comm-fill" x="40" y="164" width="100" height="14" rx="2" opacity="0.82"/>
    <rect class="gemm-fill" x="40" y="181" width="100" height="24" rx="2" opacity="0.78"/>
    <rect class="comm-fill" x="40" y="208" width="100" height="14" rx="2" opacity="0.78"/>
    <rect class="gemm-fill" x="40" y="225" width="100" height="24" rx="2" opacity="0.74"/>
    <rect class="comm-fill" x="40" y="252" width="100" height="8" rx="2" opacity="0.74"/>
  </g>

  <!-- ===== Pattern 3: ProducerConsumer ===== -->
  <g transform="translate(410, 0)">
    <text class="pattern-name" x="90" y="56" text-anchor="middle">ProducerConsumer</text>
    <text class="pattern-desc" x="90" y="70" text-anchor="middle">tile-level, parallel</text>

    <text class="label" x="52" y="82" text-anchor="middle">stream 1</text>
    <text class="label" x="128" y="82" text-anchor="middle">stream 2</text>

    <!-- Stream 1: compute -->
    <rect class="gemm-fill" x="35" y="88" width="45" height="30" rx="2" opacity="0.82"/>
    <rect class="gemm-fill" x="35" y="122" width="45" height="30" rx="2" opacity="0.82"/>
    <rect class="gemm-fill" x="35" y="156" width="45" height="30" rx="2" opacity="0.78"/>
    <rect class="gemm-fill" x="35" y="190" width="45" height="30" rx="2" opacity="0.74"/>
    <rect class="gemm-fill" x="35" y="224" width="45" height="30" rx="2" opacity="0.70"/>

    <!-- Stream 2: scatter (offset to show parallel) -->
    <rect class="comm-fill" x="100" y="122" width="45" height="26" rx="2" opacity="0.82"/>
    <rect class="comm-fill" x="100" y="156" width="45" height="26" rx="2" opacity="0.78"/>
    <rect class="comm-fill" x="100" y="190" width="45" height="26" rx="2" opacity="0.74"/>
    <rect class="comm-fill" x="100" y="224" width="45" height="26" rx="2" opacity="0.70"/>
    <rect class="comm-fill" x="100" y="258" width="45" height="16" rx="2" opacity="0.66"/>

    <!-- Signal arrows -->
    <line x1="80" y1="118" x2="98" y2="135" stroke="#888" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#tah)"/>
    <line x1="80" y1="152" x2="98" y2="169" stroke="#888" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#tah)"/>
    <line x1="80" y1="186" x2="98" y2="203" stroke="#888" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#tah)"/>
  </g>

  <!-- ===== Pattern 4: WG-Specialized ===== -->
  <g transform="translate(600, 0)">
    <text class="pattern-name" x="90" y="56" text-anchor="middle">WG-Specialized</text>
    <text class="pattern-desc" x="90" y="70" text-anchor="middle">SM-partitioned, parallel</text>

    <rect x="35" y="88" width="110" height="186" rx="3" fill="none" stroke="#666" stroke-width="1"/>
    <text class="label" x="90" y="82" text-anchor="middle">single kernel</text>

    <!-- SM partition labels -->
    <text class="label" x="60" y="100" text-anchor="middle">SM 0..C</text>
    <text class="label" x="120" y="100" text-anchor="middle">SM C..N</text>

    <!-- Divider line -->
    <line x1="90" y1="104" x2="90" y2="268" stroke="#aaa" stroke-width="0.6" stroke-dasharray="3,2"/>

    <!-- Left: compute SMs (continuous blocks) -->
    <rect class="gemm-fill" x="40" y="106" width="46" height="156" rx="2" opacity="0.82"/>
    <text x="63" y="185" text-anchor="middle" fill="#fff" font-size="10" font-weight="600" transform="rotate(-90,63,185)">compute workgroups</text>

    <!-- Right: comm SMs (continuous blocks) -->
    <rect class="comm-fill" x="94" y="106" width="46" height="156" rx="2" opacity="0.82"/>
    <text x="117" y="185" text-anchor="middle" fill="#fff" font-size="10" font-weight="600" transform="rotate(-90,117,185)">comm workgroups</text>

    <!-- Signal arrows from compute to comm -->
    <line x1="86" y1="140" x2="94" y2="140" stroke="#fff" stroke-width="1.5" marker-end="url(#tah)"/>
    <line x1="86" y1="175" x2="94" y2="175" stroke="#fff" stroke-width="1.5" marker-end="url(#tah)"/>
    <line x1="86" y1="210" x2="94" y2="210" stroke="#fff" stroke-width="1.5" marker-end="url(#tah)"/>
    <line x1="86" y1="245" x2="94" y2="245" stroke="#fff" stroke-width="1.5" marker-end="url(#tah)"/>
  </g>

  <!-- Legend -->
  <rect class="gemm-fill" x="295" y="296" width="12" height="9" rx="2" opacity="0.85"/>
  <text x="311" y="304" font-size="10" fill="#555">Compute</text>
  <rect class="comm-fill" x="380" y="296" width="12" height="9" rx="2" opacity="0.85"/>
  <text x="396" y="304" font-size="10" fill="#555">Communication</text>
  <rect class="barrier-fill" x="488" y="296" width="12" height="9" rx="2"/>
  <text x="504" y="304" font-size="10" fill="#555">Synchronization</text>
</svg>
