<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160">
  <defs>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a7a7a" />
      <stop offset="100%" style="stop-color:#0d5e5e" />
    </linearGradient>
    <linearGradient id="tealLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ec4c4" />
      <stop offset="100%" style="stop-color:#4aadad" />
    </linearGradient>
  </defs>

  <!-- 2x2 tile grid — simple, iconic -->
  <rect x="32"  y="30" width="40" height="40" rx="5" fill="url(#teal)" />
  <rect x="78"  y="30" width="40" height="40" rx="5" fill="url(#teal)" />
  <rect x="32"  y="76" width="40" height="40" rx="5" fill="url(#tealLight)" />
  <rect x="78"  y="76" width="40" height="40" rx="5" fill="url(#tealLight)" />

  <!-- Wordmark -->
  <text x="152" y="88" font-family="'Helvetica Neue',Arial,sans-serif" font-size="64" font-weight="700" fill="#1a3a3a" letter-spacing="-2">Tile<tspan fill="#1a7a7a">CCL</tspan></text>

  <!-- Tagline -->
  <text x="154" y="114" font-family="'Helvetica Neue',Arial,sans-serif" font-size="15" fill="#6b8a8a" letter-spacing="0.5">Tile-native Collective Communication Library</text>
</svg>
