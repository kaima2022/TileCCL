<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 530" font-family="'Helvetica Neue', 'Arial', sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#bbb"/>
    </marker>
    <marker id="arr-dark" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#888"/>
    </marker>
  </defs>

  <rect width="820" height="530" fill="#fff"/>

  <!-- ====== Layer 1: User API ====== -->
  <rect x="50" y="24" width="720" height="68" rx="8" fill="#fafafa" stroke="#d4d4d4" stroke-width="1"/>
  <text x="70" y="46" font-size="9.5" font-weight="700" fill="#999" letter-spacing="1.2">USER API</text>
  <text x="750" y="46" text-anchor="end" font-size="9" fill="#bbb" font-style="italic">tileccl.ops</text>
  <text x="410" y="70" text-anchor="middle" font-size="12" font-weight="600" fill="#444">gemm_allscatter · gemm_allgather · gemm_reducescatter · allreduce · allgather · reduce_scatter</text>
  <text x="410" y="85" text-anchor="middle" font-size="10" fill="#999">Plan-based execution: build once, execute many</text>

  <!-- Arrow -->
  <line x1="410" y1="92" x2="410" y2="112" stroke="#bbb" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ====== Layer 2: Execution Engine ====== -->
  <rect x="50" y="114" width="720" height="50" rx="8" fill="#fafafa" stroke="#d4d4d4" stroke-width="1"/>
  <text x="70" y="135" font-size="9.5" font-weight="700" fill="#999" letter-spacing="1.2">EXECUTION ENGINE</text>
  <text x="410" y="153" text-anchor="middle" font-size="11" fill="#555">Auto pattern selection · Contract validation · Overlap strategy dispatch</text>

  <!-- Arrow -->
  <line x1="410" y1="164" x2="410" y2="186" stroke="#bbb" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ====== Layer 3: TILE-NATIVE PRIMITIVES (core) ====== -->
  <rect x="40" y="188" width="740" height="218" rx="10" fill="#fcfcfd" stroke="#444" stroke-width="2"/>

  <!-- Header bar -->
  <text x="64" y="212" font-size="11" font-weight="800" fill="#222" letter-spacing="1.5">TILE-NATIVE PRIMITIVES</text>

  <!-- Compiler visibility annotation -->
  <rect x="474" y="197" width="290" height="22" rx="11" fill="#f0f0f0" stroke="#ccc" stroke-width="0.8"/>
  <text x="619" y="212" text-anchor="middle" font-size="9.5" font-weight="600" fill="#888">all @triton.jit — full compiler visibility</text>

  <!-- Three primitive group cards -->

  <!-- Card 1: Data Movement (orange) -->
  <rect x="62" y="228" width="214" height="162" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="62" y="228" width="214" height="5" rx="6" fill="#E8963A"/>
  <rect x="62" y="228" width="214" height="5" fill="#E8963A"/><!-- cover bottom radius of top strip -->
  <rect x="62" y="228" width="214" height="5" rx="6" fill="#E8963A"/>

  <text x="169" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#D07A28">Data Movement</text>
  <text x="169" y="272" text-anchor="middle" font-size="9.5" fill="#999">Zero-copy tile transfers</text>

  <line x1="82" y1="282" x2="256" y2="282" stroke="#f0f0f0" stroke-width="1"/>

  <text x="169" y="302" text-anchor="middle" font-size="10.5" fill="#555" font-weight="500">tile_remote_load</text>
  <text x="169" y="319" text-anchor="middle" font-size="10.5" fill="#555" font-weight="500">tile_remote_store</text>
  <text x="169" y="343" text-anchor="middle" font-size="10.5" fill="#555" font-weight="500">tile_put · tile_get</text>

  <text x="169" y="380" text-anchor="middle" font-size="8.5" fill="#bbb">registers ↔ remote · memory ↔ remote</text>

  <!-- Card 2: Synchronization (purple) -->
  <rect x="294" y="228" width="214" height="162" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="294" y="228" width="214" height="5" rx="6" fill="#8B5CF6"/>
  <rect x="294" y="228" width="214" height="5" fill="#8B5CF6"/>
  <rect x="294" y="228" width="214" height="5" rx="6" fill="#8B5CF6"/>

  <text x="401" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#7347D6">Synchronization</text>
  <text x="401" y="272" text-anchor="middle" font-size="9.5" fill="#999">Cross-tile coordination</text>

  <line x1="314" y1="282" x2="488" y2="282" stroke="#f0f0f0" stroke-width="1"/>

  <text x="401" y="302" text-anchor="middle" font-size="10.5" fill="#555" font-weight="500">tile_signal · tile_wait</text>
  <text x="401" y="319" text-anchor="middle" font-size="10.5" fill="#555" font-weight="500">tile_atomic_add · cas · xchg</text>
  <text x="401" y="336" text-anchor="middle" font-size="10.5" fill="#555" font-weight="500">tile_atomic_min · max</text>
  <text x="401" y="353" text-anchor="middle" font-size="10.5" fill="#555" font-weight="500">tile_atomic_and · or · xor</text>

  <text x="401" y="380" text-anchor="middle" font-size="8.5" fill="#bbb">release-acquire · memory ordering</text>

  <!-- Card 3: Collectives (blue) -->
  <rect x="526" y="228" width="236" height="162" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="526" y="228" width="236" height="5" rx="6" fill="#4A7FC7"/>
  <rect x="526" y="228" width="236" height="5" fill="#4A7FC7"/>
  <rect x="526" y="228" width="236" height="5" rx="6" fill="#4A7FC7"/>

  <text x="644" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#3968A8">Tile Collectives</text>
  <text x="644" y="272" text-anchor="middle" font-size="9.5" fill="#999">Device-side collective algorithms</text>

  <line x1="546" y1="282" x2="742" y2="282" stroke="#f0f0f0" stroke-width="1"/>

  <text x="644" y="302" text-anchor="middle" font-size="10.5" fill="#555" font-weight="500">tile_allreduce</text>
  <text x="644" y="319" text-anchor="middle" font-size="10.5" fill="#555" font-weight="500">tile_allgather</text>
  <text x="644" y="336" text-anchor="middle" font-size="10.5" fill="#555" font-weight="500">tile_reduce_scatter</text>
  <text x="644" y="353" text-anchor="middle" font-size="10.5" fill="#555" font-weight="500">tile_broadcast · tile_scatter</text>

  <text x="644" y="380" text-anchor="middle" font-size="8.5" fill="#bbb">ring · direct-write · no NCCL</text>

  <!-- Composition arrows between cards -->
  <line x1="276" y1="310" x2="294" y2="310" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="508" y1="310" x2="526" y2="310" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Arrow from primitives to memory -->
  <line x1="410" y1="406" x2="410" y2="426" stroke="#888" stroke-width="1" marker-end="url(#arr-dark)"/>

  <!-- ====== Layer 4: Symmetric Memory ====== -->
  <rect x="50" y="428" width="720" height="50" rx="8" fill="#f0f7f3" stroke="#b8d9c5" stroke-width="1"/>
  <text x="70" y="449" font-size="9.5" font-weight="700" fill="#5BA87B" letter-spacing="1.2">SYMMETRIC MEMORY</text>
  <text x="410" y="468" text-anchor="middle" font-size="11" fill="#555">Heap allocation · translate_ptr · Peer mapping · Zero-copy remote access</text>

  <!-- Arrow -->
  <line x1="410" y1="478" x2="410" y2="494" stroke="#bbb" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ====== Layer 5: Hardware ====== -->
  <rect x="50" y="496" width="720" height="30" rx="6" fill="#eee" stroke="#ccc" stroke-width="1"/>
  <text x="410" y="516" text-anchor="middle" font-size="10.5" font-weight="600" fill="#888">CUDA / HIP    ·    NVLink / xGMI    ·    Peer Access</text>

</svg>
